<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Verticale arm -->
  <line x1="12" y1="3" x2="12" y2="21"
        stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  <!-- 60° arm -->
  <line x1="5" y1="7.5" x2="19" y2="16.5"
        stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  <!-- 120° arm -->
  <line x1="19" y1="7.5" x2="5" y2="16.5"
        stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Kleine haaktjes op verticale arm (boven en onder) -->
  <line x1="10" y1="6" x2="12" y2="3"
        stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="6" x2="12" y2="3"
        stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10" y1="18" x2="12" y2="21"
        stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14" y1="18" x2="12" y2="21"
        stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Middelpunt -->
  <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
</svg>
