<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adlar Live Operation</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8faf7;
      --panel: #ffffff;
      --panel-soft: #eef4f0;
      --text: #17211b;
      --muted: #68736c;
      --border: rgba(22, 35, 27, 0.1);
      --accent: #0f8f67;
      --accent-soft: #dff5eb;
      --warn: #b96500;
      --warn-soft: #fff0d7;
      --danger: #b42318;
      --danger-soft: #ffe4df;
      --shadow: 0 8px 24px rgba(15, 24, 18, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101512;
        --panel: #18201b;
        --panel-soft: #202a24;
        --text: #edf4ee;
        --muted: #9aa89f;
        --border: rgba(238, 246, 240, 0.12);
        --accent: #45d197;
        --accent-soft: rgba(69, 209, 151, 0.14);
        --warn: #ffb75d;
        --warn-soft: rgba(255, 183, 93, 0.16);
        --danger: #ff8a7d;
        --danger-soft: rgba(255, 138, 125, 0.16);
        --shadow: none;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    button,
    body {
      letter-spacing: 0;
    }

    .widget {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      min-height: 340px;
      padding: 12px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .device-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 5px;
      min-width: 0;
    }

    .pill {
      min-width: 0;
      max-width: 115px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.1;
    }

    .pill.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .pill.warn {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .pill.danger {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .main {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 10px;
      min-height: 0;
    }

    .hero {
      display: grid;
      align-content: space-between;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .hero-label,
    .metric-label,
    .footer-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .delta {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
    }

    .delta-value {
      font-size: 42px;
      font-weight: 800;
      line-height: 0.95;
    }

    .delta-unit {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .power-line {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .power-box,
    .metric {
      border-radius: 8px;
      background: var(--panel-soft);
      padding: 9px;
      min-width: 0;
    }

    .power-value,
    .metric-value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 19px;
      font-weight: 800;
      line-height: 1.15;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      min-width: 0;
    }

    .metric-value.small {
      font-size: 16px;
    }

    .footer {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .footer-item {
      min-width: 0;
      border-top: 1px solid var(--border);
      padding-top: 7px;
    }

    .footer-value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 800;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 316px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    @media (max-width: 360px) {
      .widget {
        gap: 8px;
        padding: 10px;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .delta-value {
        font-size: 34px;
      }

      .footer {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main id="root" class="empty">Live bedrijf wordt geladen...</main>

  <script>
    function onHomeyReady(Homey) {
      var root = document.getElementById('root');
      var refreshTimer = null;

      function formatValue(value, suffix, decimals) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) return '-';
        return Number(value).toFixed(decimals) + suffix;
      }

      function formatAge(ageMs) {
        if (ageMs === null || ageMs === undefined) return '-';
        var seconds = Math.max(0, Math.round(ageMs / 1000));
        if (seconds < 60) return seconds + 's';
        return Math.round(seconds / 60) + 'm';
      }

      function statusClass(state) {
        if (!state.ok || state.status.faultActive) return 'danger';
        if (state.status.defrosting || state.data.freshness === 'stale') return 'warn';
        if (state.status.running || state.status.compressorOn) return 'active';
        return '';
      }

      function renderEmpty(message) {
        root.className = 'empty';
        root.textContent = message || 'Geen live data beschikbaar.';
      }

      function render(state) {
        if (!state || !state.ok) {
          renderEmpty(state && state.message ? state.message : 'Geen live data beschikbaar.');
          return;
        }

        var cls = statusClass(state);
        var statusText = state.status.faultActive
          ? 'Storing'
          : state.status.defrosting
            ? 'Defrost'
            : state.status.running || state.status.compressorOn
              ? 'Actief'
              : 'Standby';
        var cop = state.process.liveCopEstimate !== null
          ? state.process.liveCopEstimate
          : state.process.capabilityCop;

        root.className = 'widget';
        root.innerHTML = [
          '<section class="topbar">',
          '<div class="device-name">' + escapeHtml(state.device.name || 'Adlar warmtepomp') + '</div>',
          '<div class="pills">',
          '<span class="pill ' + cls + '">' + escapeHtml(statusText) + '</span>',
          '<span class="pill">' + escapeHtml(state.status.mode) + '</span>',
          '<span class="pill ' + (state.data.freshness === 'stale' ? 'warn' : '') + '">' + escapeHtml(state.status.connectionStatus) + '</span>',
          '</div>',
          '</section>',
          '<section class="main">',
          '<div class="hero">',
          '<div>',
          '<div class="hero-label">Delta T water</div>',
          '<div class="delta"><span class="delta-value">' + formatValue(state.process.deltaTC, '', 1) + '</span><span class="delta-unit">C</span></div>',
          '</div>',
          '<div class="power-line">',
          metricBox('Input', formatValue(state.process.electricalPowerKw, ' kW', 2)),
          metricBox('Output', formatValue(state.process.thermalPowerKw, ' kW', 2)),
          '</div>',
          '</div>',
          '<div class="grid">',
          metricBox('Flow', formatValue(state.process.flowLpm, ' L/min', 1)),
          metricBox('Compressor', formatValue(state.process.compressorHz, ' Hz', 0)),
          metricBox('COP live', formatValue(cop, '', 1)),
          metricBox('Defrost', state.status.defrosting ? 'Ja' : 'Nee'),
          '</div>',
          '</section>',
          '<section class="footer">',
          footerItem('Aanvoer', formatValue(state.temperatures.outletC, ' C', 1)),
          footerItem('Retour', formatValue(state.temperatures.inletC, ' C', 1)),
          footerItem('Buiten', formatValue(state.temperatures.ambientC, ' C', 1)),
          footerItem('Update', formatAge(state.data.ageMs)),
          '</section>',
        ].join('');
      }

      function metricBox(label, value) {
        return [
          '<div class="metric">',
          '<div class="metric-label">' + escapeHtml(label) + '</div>',
          '<div class="metric-value small">' + escapeHtml(value) + '</div>',
          '</div>',
        ].join('');
      }

      function footerItem(label, value) {
        return [
          '<div class="footer-item">',
          '<div class="footer-label">' + escapeHtml(label) + '</div>',
          '<div class="footer-value">' + escapeHtml(value) + '</div>',
          '</div>',
        ].join('');
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function getDeviceId() {
        if (typeof Homey.getDeviceIds !== 'function') return '';
        var ids = Homey.getDeviceIds();
        return Array.isArray(ids) && ids.length > 0 ? ids[0] : '';
      }

      function load() {
        var deviceId = getDeviceId();
        var path = deviceId ? '/?deviceId=' + encodeURIComponent(deviceId) : '/';
        Homey.api('GET', path, {})
          .then(function(state) {
            render(state);
          })
          .catch(function() {
            renderEmpty('Live data kon niet worden geladen.');
          });
      }

      load();
      refreshTimer = setInterval(load, 10000);
      window.addEventListener('beforeunload', function() {
        if (refreshTimer) clearInterval(refreshTimer);
      });
      Homey.ready();
    }
  </script>
</body>
</html>
