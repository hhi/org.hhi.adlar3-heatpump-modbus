<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Change Log</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 1.5rem; }
  nav { margin: -1.5rem -1.5rem 1.5rem; padding: 8px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; gap: 8px; flex-wrap: wrap; }
  nav a { font-size: 12px; font-weight: 600; color: #94a3b8; text-decoration: none; padding: 4px 12px; border-radius: 9999px; border: 1px solid #334155; transition: background 0.15s, color 0.15s; }
  nav a:hover { background: #334155; color: #f8fafc; }
  nav a.active { background: #0f172a; color: #38bdf8; border-color: #38bdf8; }
  h1 { font-size: 1.2rem; font-weight: 600; color: #f8fafc; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.78rem; color: #64748b; margin-bottom: 1.25rem; }
  .toolbar { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  .btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; font-size: 0.78rem; padding: 0.35rem 0.8rem; border-radius: 0.375rem; cursor: pointer; }
  .btn:hover { background: #293548; color: #e2e8f0; }
  .btn-primary { background: #1d4ed8; border-color: #2563eb; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  input[type=search] { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; font-size: 0.8rem; padding: 0.35rem 0.75rem; border-radius: 0.375rem; width: 220px; }
  input[type=search]::placeholder { color: #475569; }
  .filter-group { display: flex; gap: 0.4rem; align-items: center; }
  .pill { font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 9999px; border: 1px solid transparent; cursor: pointer; -webkit-user-select: none; user-select: none; }
  .pill.superfast { background: #4c1d95; border-color: #7c3aed; color: #ddd6fe; }
  .pill.fast      { background: #1e3a5f; border-color: #3b82f6; color: #bfdbfe; }
  .pill.medium    { background: #14532d; border-color: #22c55e; color: #bbf7d0; }
  .pill.slow      { background: #431407; border-color: #f97316; color: #fed7aa; }
  .pill.once      { background: #1e1b4b; border-color: #818cf8; color: #c7d2fe; }
  .pill.manual    { background: #1c1917; border-color: #78716c; color: #d6d3d1; }
  .pill.inactive  { opacity: 0.35; }
  .stats { font-size: 0.75rem; color: #64748b; margin-left: auto; }
  .last-load { font-size: 0.72rem; color: #475569; }
  @keyframes tbl-flash { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  .flash { animation: tbl-flash 0.4s ease; }
  .filter-label { font-size: 0.75rem; color: #64748b; display: flex; align-items: center; gap: 0.4rem; }
  .filter-label input { accent-color: #3b82f6; }
  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  thead th { background: #1e293b; color: #94a3b8; font-weight: 500; padding: 0.5rem 0.6rem; text-align: left; border-bottom: 1px solid #334155; white-space: nowrap; cursor: pointer; -webkit-user-select: none; user-select: none; }
  thead th:hover { color: #e2e8f0; }
  thead th .sort-icon { margin-left: 0.25rem; opacity: 0.4; }
  thead th.sorted .sort-icon { opacity: 1; color: #60a5fa; }
  tbody tr { border-bottom: 1px solid #1e293b; }
  tbody tr:hover { background: #1a2535; }
  td { padding: 0.45rem 0.6rem; vertical-align: middle; }
  .addr { font-family: monospace; color: #7dd3fc; }
  .name { color: #cbd5e1; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .zero { color: #334155; }
  .match { color: #4ade80; }
  .mismatch { color: #fb923c; }
  .unknown { color: #64748b; }
  .no-data { color: #64748b; font-style: italic; }
  .empty { text-align: center; padding: 3rem; color: #475569; }
  details { margin-bottom: 1.25rem; }
  details summary { list-style: none; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.55rem 0.75rem; background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; font-size: 0.82rem; font-weight: 600; color: #cbd5e1; -webkit-user-select: none; user-select: none; }
  details summary::-webkit-details-marker { display: none; }
  details[open] summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom-color: #0f172a; }
  details summary .chevron { font-size: 0.65rem; color: #64748b; transition: transform 0.15s; }
  details[open] summary .chevron { transform: rotate(90deg); }
  details summary .section-count { font-size: 0.72rem; color: #64748b; font-weight: 400; }
  details .table-wrap { border: 1px solid #334155; border-top: none; border-radius: 0 0 0.5rem 0.5rem; overflow: hidden; }
  @media (prefers-color-scheme: light) {
    body { background: #f8fafc; color: #0f172a; }
    h1 { color: #0f172a; }
    .subtitle { color: #475569; }
    .btn { background: #f1f5f9; border-color: #e2e8f0; color: #1e293b; }
    .btn:hover { background: #e2e8f0; color: #0f172a; }
    input[type=search] { background: #f8fafc; border-color: #e2e8f0; color: #0f172a; }
    input[type=search]::placeholder { color: #94a3b8; }
    .filter-label { color: #475569; }
    .stats { color: #475569; }
    .pill.superfast { background: #ede9fe; border-color: #7c3aed; color: #5b21b6; }
    .pill.fast      { background: #e0f2fe; border-color: #3b82f6; color: #1d4ed8; }
    .pill.medium    { background: #dcfce7; border-color: #22c55e; color: #166534; }
    .pill.slow      { background: #ffedd5; border-color: #f97316; color: #9a3412; }
    .pill.once      { background: #e0e7ff; border-color: #818cf8; color: #4338ca; }
    .pill.manual    { background: #f1f5f9; border-color: #94a3b8; color: #475569; }
    thead th { background: #f1f5f9; color: #475569; border-bottom-color: #e2e8f0; }
    thead th:hover { color: #0f172a; }
    thead th.sorted .sort-icon { color: #0284c7; }
    tbody tr { border-bottom-color: #f1f5f9; }
    tbody tr:hover { background: #f1f5f9; }
    td { color: #0f172a; }
    .addr { color: #0369a1; }
    .name { color: #1e293b; }
    .zero { color: #cbd5e1; }
    .match { color: #166534; }
    .mismatch { color: #9a3412; }
    .unknown { color: #94a3b8; }
    .no-data { color: #94a3b8; }
    .empty { color: #94a3b8; }
    nav { background: #ffffff; border-bottom-color: #e2e8f0; }
    nav a { color: #475569; border-color: #e2e8f0; }
    nav a:hover { background: #e2e8f0; color: #0f172a; }
    nav a.active { background: #e0f2fe; color: #0284c7; border-color: #0284c7; }
    details summary { background: #f1f5f9; border-color: #e2e8f0; color: #1e293b; }
    details[open] summary { border-bottom-color: #f8fafc; }
    details .table-wrap { border-color: #e2e8f0; }
  }
</style>
</head>
<body>
<nav>
  <a href="/">Dashboard</a>
  <a href="/interactive">Interactief</a>
  <a href="/live">Live</a>
  <a href="/expert">Expert</a>
  <a href="/changelog" class="active">Change Log</a>
</nav>
<h1>Register Change Log</h1>
<p class="subtitle">Statistieken per register — helpt bij het bepalen van de optimale pollgroep. Reset bij herstart van de app.</p>

<div class="toolbar">
  <button type="button" class="btn btn-primary" onclick="load()">&#8635; Vernieuwen</button>
  <input type="search" id="search" placeholder="Zoek op adres of naam…" oninput="render()">
  <div class="filter-group" id="group-filters"></div>
  <label class="filter-label">
    <input type="checkbox" id="only-changed" onchange="render()" checked> Alleen gewijzigd
  </label>
  <span class="last-load" id="last-load"></span>
  <span class="stats" id="stats"></span>
</div>

<div id="sections"></div>

<script>
  const GROUPS = ['superfast','fast','medium','slow','once','manual'];
  let data = [];
  let sortCol = 'address';
  let sortAsc = true;
  let activeGroups = new Set(GROUPS);
  let prevHashRo = '';
  let prevHashRw = '';

  function hashOf(rows) {
    return JSON.stringify(rows.map(r => [r.address, r.changeCount, r.lastValue]));
  }

  function flashSection(id) {
    const el = document.getElementById(id);
    if (el) { el.classList.add('flash'); setTimeout(() => el.classList.remove('flash'), 400); }
  }

  function load() {
    const btn = document.querySelector('button.btn-primary');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Laden…'; }

    fetch('/api/register-changelog')
      .then(r => r.json())
      .then(d => {
        const newHashRo = hashOf(d.filter(r => !r.writable));
        const newHashRw = hashOf(d.filter(r =>  r.writable));
        data = d;
        render();
        if (prevHashRo && newHashRo !== prevHashRo) flashSection('sec-ro');
        if (prevHashRw && newHashRw !== prevHashRw) flashSection('sec-rw');
        prevHashRo = newHashRo;
        prevHashRw = newHashRw;
        const ts = new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('last-load').textContent = `Bijgewerkt om ${ts}`;
      })
      .catch(e => {
        document.getElementById('sections').innerHTML = `<p class="empty">Fout: ${e.message}</p>`;
        document.getElementById('last-load').textContent = 'Laden mislukt';
      })
      .finally(() => {
        if (btn) { btn.disabled = false; btn.innerHTML = '&#8635; Vernieuwen'; }
      });
  }

  function buildGroupFilters() {
    const el = document.getElementById('group-filters');
    el.innerHTML = GROUPS.map(g =>
      `<span class="pill ${g}" data-group="${g}" onclick="toggleGroup('${g}',this)">${g}</span>`
    ).join('');
  }

  function toggleGroup(g, el) {
    if (activeGroups.has(g)) { activeGroups.delete(g); el.classList.add('inactive'); }
    else { activeGroups.add(g); el.classList.remove('inactive'); }
    render();
  }

  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = col === 'addressHex'; }
    render();
  }

  function fmtMs(ms) {
    if (ms === null) return '<span class="no-data">—</span>';
    if (ms < 1000) return ms + ' ms';
    if (ms < 60000) return (ms/1000).toFixed(1) + ' s';
    if (ms < 3600000) return (ms/60000).toFixed(1) + ' min';
    return (ms/3600000).toFixed(1) + ' u';
  }

  function fmtTime(ts) {
    if (!ts) return '<span class="no-data">—</span>';
    return new Date(ts).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  function pillHtml(group) {
    return `<span class="pill ${group || 'manual'}">${group || 'manual'}</span>`;
  }

  function recClass(current, rec) {
    if (rec === '?') return 'unknown';
    if (current === rec) return 'match';
    return 'mismatch';
  }

  const COLS = [
    { col: 'addressHex',       label: 'Adres / Naam' },
    { col: 'pollGroup',        label: 'Huidig' },
    { col: 'recommendedGroup', label: 'Aanbevolen' },
    { col: 'changeCount',      label: 'Wijzigingen' },
    { col: 'avgInterval',      label: 'Gem. interval' },
    { col: 'minInterval',      label: 'Min' },
    { col: 'maxInterval',      label: 'Max' },
    { col: 'previousValue',    label: 'Vorige waarde' },
    { col: 'lastValue',        label: 'Laatste waarde' },
    { col: 'firstSeen',        label: 'Eerste gezien' },
    { col: 'lastChanged',      label: 'Laatste wijziging' },
  ];

  function theadHtml() {
    return '<thead><tr>' + COLS.map(c => {
      const active = sortCol === c.col;
      const icon = active ? (sortAsc ? '&#9650;' : '&#9660;') : '&#9650;';
      return `<th onclick="sortBy('${c.col}')" data-col="${c.col}"${active ? ' class="sorted"' : ''}>${c.label}<span class="sort-icon">${icon}</span></th>`;
    }).join('') + '</tr></thead>';
  }

  function rowsHtml(rows) {
    if (rows.length === 0) return `<tr><td colspan="${COLS.length}" class="empty">Geen registers in deze sectie.</td></tr>`;
    return rows.map(e => {
      const rc = recClass(e.pollGroup, e.recommendedGroup);
      const recPill = e.recommendedGroup === '?' ? `<span class="unknown">?</span>` : pillHtml(e.recommendedGroup);
      return `<tr>
        <td class="addr">${e.addressHex}${e.name ? `<br><span style="font-family:system-ui;font-size:0.7rem;color:#64748b">${e.name}</span>` : ''}</td>
        <td>${pillHtml(e.pollGroup)}</td>
        <td class="${rc}">${recPill}</td>
        <td>${e.changeCount === 0 ? '<span class="zero">0</span>' : e.changeCount}</td>
        <td>${fmtMs(e.avgInterval)}</td>
        <td>${fmtMs(e.minInterval)}</td>
        <td>${fmtMs(e.maxInterval)}</td>
        <td class="addr">${e.previousValue !== null ? e.previousValue : '<span class="no-data">—</span>'}</td>
        <td class="addr">${e.lastValue}</td>
        <td>${fmtTime(e.firstSeen)}</td>
        <td>${e.changeCount > 0 ? fmtTime(e.lastChanged) : '<span class="no-data">—</span>'}</td>
      </tr>`;
    }).join('');
  }

  function sectionHtml(title, icon, rows, openAttr) {
    const changed = rows.filter(r => r.changeCount > 0).length;
    const countLabel = changed > 0
      ? `${rows.length} registers · ${changed} gewijzigd`
      : `${rows.length} registers`;
    return `<details${openAttr}>
      <summary>
        <span class="chevron">&#9654;</span>
        ${icon} ${title}
        <span class="section-count">${countLabel}</span>
      </summary>
      <div class="table-wrap">
        <table style="width:100%;border-collapse:collapse;font-size:0.78rem">
          ${theadHtml()}
          <tbody>${rowsHtml(rows)}</tbody>
        </table>
      </div>
    </details>`;
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const onlyChanged = document.getElementById('only-changed').checked;

    let rows = data.filter(e => {
      if (!activeGroups.has(e.pollGroup)) return false;
      if (onlyChanged && e.changeCount === 0) return false;
      if (q && !e.addressHex.toLowerCase().includes(q) && !String(e.address).includes(q) && !(e.name || '').toLowerCase().includes(q)) return false;
      return true;
    });

    rows.sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (av === null) av = sortAsc ? Infinity : -Infinity;
      if (bv === null) bv = sortAsc ? Infinity : -Infinity;
      if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortAsc ? av - bv : bv - av;
    });

    const el = document.getElementById('sections');
    if (rows.length === 0) {
      el.innerHTML = `<p class="empty">Geen registers gevonden. Wacht tot de app Modbus-data heeft ontvangen.</p>`;
      document.getElementById('stats').textContent = '';
      return;
    }

    const changed = rows.filter(r => r.changeCount > 0).length;
    document.getElementById('stats').textContent = `${rows.length} registers · ${changed} gewijzigd`;

    const readOnly = rows.filter(r => !r.writable);
    const readWrite = rows.filter(r => r.writable);

    const roOpen = document.querySelector('#sec-ro') ? document.querySelector('#sec-ro').open : true;
    const rwOpen = document.querySelector('#sec-rw') ? document.querySelector('#sec-rw').open : true;

    el.innerHTML =
      sectionHtml('Read-only registers', '&#128274;', readOnly,  ' id="sec-ro"' + (roOpen ? ' open' : '')) +
      sectionHtml('Read/Write registers', '&#9998;',  readWrite, ' id="sec-rw"' + (rwOpen ? ' open' : ''));
  }

  buildGroupFilters();
  load();
  setInterval(load, 60_000);
</script>
</body>
</html>
